# Reverse proxy TLS devant Open WebUI (qui écoute en clair sur :8080).
# Monté dans le conteneur nginx via compose.yml.

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/open-webui.crt;
    ssl_certificate_key /etc/nginx/certs/open-webui.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 0;   # pas de limite (upload de documents RAG)

    location / {
        proxy_pass http://open-webui:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket : indispensable pour le streaming des réponses du chat.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }
}

# Redirige tout le trafic HTTP vers HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
