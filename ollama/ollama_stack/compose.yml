# MODEL=xxxxxx docker compose --profile gpu-nvidia up -d
# MODEL=xxxxxx docker compose --profile gpu-nvidia down [-v]
# MODEL=xxxxxx docker compose --profile gpu-nvidia restart yyyyy
# MODEL=xxxxxx docker compose run --rm --no-deps zzzzz

x-service: &default-service
  restart: 'unless-stopped'
  logging:
    driver: 'json-file'
    options:
      max-size: "${LOGGING_MAX_SIZE:-100m}"
      max-file: "${LOGGING_MAX_FILE:-5}"

x-labels:
  labels: &labels
    stack: ollama
    subnet: 172.18.0.8/29

x-ollama: &service-ollama
  <<: *default-service
  image: "dawan_ollama:${DAWAN_OLLAMA_VERSION:-0.30.11}"
  # image: ollama/ollama:${OLLAMA_VERSION:-0.9.1-rc0}
  # image: "dawan_ollama:${DAWAN_OLLAMA_VERSION:-0.9}"
  # build:
  #   context: ./ollama_img
  #   args:
  #     OLLAMA_VERSION: ${OLLAMA_VERSION:-0.9.1-rc0}
  hostname: ollama
  container_name: ollama
  ports:
    - "0.0.0.0:11434:11434"
  volumes:
    - ollama:/home/ollama/.ollama
  networks:
    - dawan-ollama

x-init-ollama: &init-ollama
  # image: "dawan_ollama:${DAWAN_OLLAMA_VERSION:-0.9}"
  image: "dawan_ollama:${DAWAN_OLLAMA_VERSION:-0.30.11}"
  build:
    context: ./ollama_img
    args:
      # OLLAMA_VERSION: ${OLLAMA_VERSION:-0.9.1-rc0}
      OLLAMA_VERSION: ${OLLAMA_VERSION:-0.30.11}
  hostname: init-ollama
  container_name: init-ollama
  restart: "no"
  volumes:
    - ollama:/home/ollama/.ollama
  entrypoint: /bin/sh
  environment:
    OLLAMA_HOST: ollama:11434
    MODEL: ${MODEL}
  command:
    - "-c"
    - |
      sleep 3
      if [ -z $(ollama list | grep $MODEL) ]; then
        echo "⏳ Pulling $MODEL..."
        ollama pull $MODEL
      fi
  networks:
    - dawan-ollama

services:
  ## OLLAMA + CPU
  ollama-cpu:
    <<: *service-ollama
    profiles: ['cpu']
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      <<: *labels
      app: ollama-cpu
  
  init-ollama-cpu:
    <<: *init-ollama
    profiles: ['cpu']
    depends_on:
      ollama-cpu:
        condition: service_healthy

  ## OLLAMA + GPU NVIDIA
  ollama-gpu-nvidia:
    profiles: ['gpu-nvidia']
    <<: *service-ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ## with --gpus options
    # devices:
    #   - /dev/hpet:/dev/nvidia0
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia
  
  init-ollama-gpu-nvidia:
    <<: *init-ollama
    profiles: ['gpu-nvidia']
    labels:
      <<: *labels
      application: ollama-cpu-models
    depends_on:
      ollama-gpu-nvidia:
        condition: service_healthy

  ## Open WebUI

  open-webui:
    <<: *default-service
    profiles: ['cpu', 'gpu-nvidia']
    labels:
      <<: *labels
      app: open-webui
    # image: ghcr.io/open-webui/open-webui:${OPENWEBUI_IMAGE_VERSION:-main}
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_IMAGE_VERSION:-0.9.6}
    container_name: ollama-open-webui
    hostname: ollama-open-webui
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_OLLAMA_API=True
    networks:
      - dawan-ollama
    # Plus d'exposition directe : l'accès passe par nginx (TLS). Open WebUI
    # reste joignable uniquement sur le réseau interne dawan-ollama.
    expose:
      - "8080"
    #   init-ollama-cpu:
    #     condition: service_completed_successfully

  ## Reverse proxy TLS (certificat auto-signé) devant Open WebUI
  nginx:
    <<: *default-service
    profiles: ['cpu', 'gpu-nvidia']
    image: nginx:alpine
    container_name: ollama-nginx
    hostname: ollama-nginx
    depends_on:
      - open-webui
    volumes:
      - ./nginx/open-webui.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - dawan-ollama
    ports:
      - "0.0.0.0:3000:443"   # HTTPS (Open WebUI)
      - "0.0.0.0:8080:80"    # HTTP -> redirection 301 vers HTTPS
    labels:
      <<: *labels
      app: nginx

volumes:
  open-webui:
    name: open-webui
  ollama:
    name: ollama

networks:
  dawan-ollama:
    name: dawan-ollama
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.8/29