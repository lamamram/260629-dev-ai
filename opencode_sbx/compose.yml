services:
  opencode:
    build:
      context: .
    image: oc-base
    init: true
    working_dir: /work
    volumes:
      - ./workspace:/work
      - ./oc-config/opencode:/home/node/.config/opencode
      - ~/.local/share/opencode:/home/node/.local/share/opencode
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 8g
    cpus: 4
    extra_hosts:
      - "ollama.local=192.168.159.57"

      
